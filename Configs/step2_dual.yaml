# Control
alignment_dim: 1024
adjust_norm: False
generate: False
prompt_template: "llava_llama_2"
stage: 2
weight_sample: False

# Tune Parameter
tune_im_start: False
tune_im_patch: False
tune_rgb_bk: False
tune_rgb_pooler: True

# Task-aware MoE routing
moe_proj:
  num_experts: 4
  top_k: 2
  task_dim: 256
  include_physical_prompt: true
  routing_strategy: two_stage
  task_expert_ratio: 0.5
  # Strengthen MoE regularization in stage-2 to reduce single-expert collapse.
  aux_balance_coef: 8.0
  aux_entropy_coef: 0.01
  aux_zloss_coef: 0.001
  aux_task_route_coef: 0.3
  aux_element_route_coef: 0.3
  aux_task_element_orth_coef: 0.02
  route_effect_margin: 0.3
  route_supervision_temperature: 0.5

rgb_vision:
  arch: dual
  # global encoder uses DINOv3 ViT-L/16 (frozen)
  global_encoder_name: dinov3_vitl16
  # local encoder uses DINOv3 ConvNeXt via timm (frozen)
  local_source: dino
  local_encoder_name: convnext_base
  # path to DINOv3 ConvNeXt-Base checkpoint
  local_ckpt_path: './dinov3_convnext_base_pretrain_lvd1689m-801f2ba9.pth'
  freeze_global: True
  freeze_local: True
  # required: path to DINOv3 ViT-L/16 checkpoint (.pth/.pt)
  global_ckpt_path: './dinov3_vitl16_pretrain_sat493m-eadcf0ff.pth'
  input_size: [224, 224]
  # Physical prompt embedding dim (LLaMA2-7B token embedding is 4096)
  physical_prompt_dim: 4096
  patch_dropout: 0.
  input_patchnorm: False
  tune_pooler: True
  attn_pooler:
    num_query: 144
    num_attn_heads: 16
    num_layers: 6
text:
  # llama-v2 config
  vocab_size: 32000
  hidden_size: 4096
  intermediate_size: 11008
  num_hidden_layers: 32
  num_attention_heads: 32
  hidden_act: "silu"
  max_position_embeddings: 2048
  initializer_range: 0.02
  rms_norm_eps: 1e-5
  use_cache: True
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  tie_word_embeddings: False
  path: meta-llama/Llama-2-7b-chat-hf
sar_vision:
  arch: base
  input_size: [192, 192]
  n_queries: 256
  in_chans: 2
  # decoder Parameter
  decoder:
    layers: 12
    heads: 12
    mask_ratio: 0.6
    mask_color: mean
    hidden_size: 768
  # loss Parameter
  loss_weight: 1.0
  reduction: none
  activate: sigmoid
  alpha: 0.2
  focal_gamma: 1.0
  residual: False
  unmask_weight: 0.0
  # DINO Contrastive Learning Parameter
  online_temp: 0.1
  branch_temp: 0.07
  warmup_branch_temp: 0.04
  warmup_branch_temp_epochs: 2
transform:
  # input_size: [192, 192]
  input_size: [224, 224]
  rand_aug: rand-m5-n2-mstd0.5-inc1
# semantic routing / physical prompt token lengths
physical_prompt_max_len: 64
task_text_max_len: 16
element_text_max_len: 16
eval:
  dataset: AID

# training config
mm_moe_aux_weight: 0.1
dtype: float16
bits: 8
double_quant: True
quant_type: nf4
fp16: True
bf16: False
lora:
  enable: True
  lora_r: 128
  lora_alpha: 256
  lora_dropout: 0.05
  lora_bias: none
tune_multimodal: True
coord_bins:
  enable: true
  max_bin: 1000

# optimizer
optimizer: adamw
lr: 0.0002
wd: 0.
epochs: 1
max_grad_norm: 1.0
betas: [0.9, 0.95]

# scheduler
schedule:
  name: cosine
  min_lr: 0.00008
  warmup_epochs: 100
  warmup_method: linear
  warmup_factor: 0.01
  decay_epochs: 30
  decay_rate: 0.1
  multisteps: []
  gamma: 0.1

# Physics branch configuration
physics:
  enabled: true
  out_channels: 1
  loss_weight: 1.0
  edge_weight: 0.0
  tv_weight: 0.01
  consistency_weight: 0.05
  spectral_weight: 0.0
  auto_gt_from_constraints: true
  # Optional SAR empirical coefficients for auto GT when constraints provided
  sar_sigma0_coeffs:
    A: -10.0
    B: 2.0
    C: 0.05
    D_VV: 0.0
    D_VH: -3.0

# Aquaculture segmentation (MOE) configuration
aquaculture_seg:
  enabled: true
  num_classes: 2
  loss_weight: 1.0
  ce_weight: 1.0
  dice_weight: 0.0
  ignore_index: 255
  include_context_expert: true
  log_gate_stats: true
  router_aux_loss_coef:
    entropy: 0.001
    zloss: 0.001
  adapters:
    enable: false
    spectral:
      enable: false
      target_dim: 16
    texture:
      enable: false
      target_dim: 8
      depth: 2
    spp:
      enable: false
      project_dim: 64
      levels: [1, 2, 4]
    modality_gate:
      enable: false
      optical_weight: 0.7
      sar_weight: 0.3
      cloudy_boost: 0.3
