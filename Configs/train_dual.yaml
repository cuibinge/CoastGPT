# Control
alignment_dim: 1024
adjust_norm: False
generate: False
prompt_template: "plain"
stage: 1

# Tune Parameter
tune_im_start: False
tune_im_patch: False
tune_rgb_bk: False
tune_rgb_pooler: True

rgb_vision:
  arch: dual
  # global encoder uses DINOv3 ViT-L/16 (frozen)
  global_encoder_name: dinov3_vitl16
  # local encoder uses DINOv3 ConvNeXt via timm (frozen)
  local_source: dino
  local_encoder_name: convnext_base
  # path to DINOv3 ConvNeXt-Base checkpoint
  local_ckpt_path: './dinov3_convnext_base_pretrain_lvd1689m-801f2ba9.pth'
  freeze_global: True
  freeze_local: True
  # required: path to DINOv3 ViT-L/16 checkpoint (.pth/.pt)
  global_ckpt_path: './dinov3_vitl16_pretrain_sat493m-eadcf0ff.pth'
  input_size: [224, 224]
  patch_dropout: 0.
  input_patchnorm: False
  tune_pooler: True
  attn_pooler:
    num_query: 144
    num_attn_heads: 16
    num_layers: 6
text:
  # llama-v2 config
  vocab_size: 32000
  hidden_size: 4096
  intermediate_size: 11008
  num_hidden_layers: 32
  num_attention_heads: 32
  hidden_act: "silu"
  max_position_embeddings: 2048
  initializer_range: 0.02
  rms_norm_eps: 1e-5
  use_cache: True
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  tie_word_embeddings: False
  path: meta-llama/Llama-2-7b-chat-hf
sar_vision:
  arch: base
  input_size: [192, 192]
  n_queries: 256
  in_chans: 2
  # decoder Parameter
  decoder:
    layers: 12
    heads: 12
    mask_ratio: 0.6
    mask_color: mean
    hidden_size: 768
  # loss Parameter
  loss_weight: 1.0
  reduction: none
  activate: sigmoid
  alpha: 0.2
  focal_gamma: 1.0
  residual: False
  unmask_weight: 0.0
  # DINO Contrastive Learning Parameter
  online_temp: 0.1
  branch_temp: 0.07
  warmup_branch_temp: 0.04
  warmup_branch_temp_epochs: 2
transform:
  # input_size: [192, 192]
  input_size: [224, 224]
  rand_aug: rand-m5-n2-mstd0.5-inc1
eval:
  dataset: AID

# training config
dtype: float16
bits: 16
double_quant: True
quant_type: nf4
fp16: True
bf16: False
lora:
  enable: False  # True for stage 2
  lora_r: 128
  lora_alpha: 256
  lora_dropout: 0.05
  lora_bias: none

# optimizer
optimizer: adanp
lr: 0.0002
wd: 0.
epochs: 1
max_grad_norm: 0.0

# scheduler
schedule:
  name: cosine
  min_lr: 0.00002
  warmup_epochs: 300
  warmup_method: linear
  warmup_factor: 0.1
  decay_epochs: 30
  decay_rate: 0.1
  multisteps: []
  gamma: 0.1


# Physics branch configuration
physics:
  enabled: true
  out_channels: 1
  loss_weight: 1.0
  edge_weight: 0.0
  tv_weight: 0.01
  consistency_weight: 0.05
  spectral_weight: 0.0
  auto_gt_from_constraints: true
  # Optional SAR empirical coefficients for auto GT when constraints provided
  sar_sigma0_coeffs:
    A: -10.0
    B: 2.0
    C: 0.05
    D_VV: 0.0
    D_VH: -3.0

# Aquaculture segmentation (MOE) configuration
aquaculture_seg:
  enabled: true            # 设置为 false 可禁用分割头
  num_classes: 2           # 类别数：如 [背景, 养殖区]
  loss_weight: 1.0         # 分割总体损失的权重
  ce_weight: 1.0           # 交叉熵损失权重
  dice_weight: 0.0         # Dice 损失权重
  ignore_index: 255        # 标注中忽略标签的索引值
  include_context_expert: true  # 启用 ASPP/SPP 上下文专家
  log_gate_stats: true     # 记录门控权重统计（mean、Top-1 占比）
  # 路由器正则项系数（用于训练时辅助约束门控分布）
  router_aux_loss_coef:
    entropy: 0.001         # 建议范围 1e-4 ~ 5e-3；增大更均匀
    zloss: 0.001           # 建议范围 1e-4 ~ 5e-3；抑制logits过大
  # 适配器配置（安全默认值：整体关闭）
  adapters:
    enable: false
    spectral:
      enable: false
      target_dim: 16    # 示例：光谱专家输入压缩到 16 维
    texture:
      enable: false
      target_dim: 8     # 示例：纹理专家输入压缩到 8 维
      depth: 2
    spp:
      enable: false
      project_dim: 64   # 示例：SPP 筛选后投影到 64 维
      levels: [1, 2, 4]
    modality_gate:
      enable: false
      optical_weight: 0.7
      sar_weight: 0.3
      cloudy_boost: 0.3